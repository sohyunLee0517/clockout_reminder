<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- 투명 배경: Android 적응형 아이콘 전경 (안전영역 안에 배치) -->
  <g transform="translate(512,512) scale(0.66) translate(-512,-560)">
    <!-- clock face -->
    <circle cx="512" cy="472" r="300" fill="#FFFFFF"/>
    <g stroke="#1A2B45" stroke-linecap="round" fill="none">
      <line x1="512" y1="472" x2="512" y2="290" stroke-width="36"/>
      <line x1="512" y1="472" x2="648" y2="512" stroke-width="36"/>
    </g>
    <circle cx="512" cy="472" r="34" fill="#1A2B45"/>
    <!-- check badge -->
    <circle cx="712" cy="700" r="172" fill="#34C759" stroke="#FFFFFF" stroke-width="30"/>
    <path d="M636 702 L692 760 L792 640" fill="none" stroke="#FFFFFF"
          stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
